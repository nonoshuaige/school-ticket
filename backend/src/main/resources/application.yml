server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/school_ticket?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        concurrency: 2
        max-concurrency: 4

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Feed 配置
feed:
  middle-v-enter-threshold: 1000  # 粉丝达到此数进入中腰部作者，仅向活跃粉丝 fanout
  middle-v-exit-threshold: 800    # 中腰部作者粉丝跌破此数才退回普通作者，避免阈值抖动
  big-v-enter-threshold: 10000    # 粉丝达到此数进入大V，走拉模式不 fanout
  big-v-exit-threshold: 8000      # 大V 粉丝跌破此数才退回中腰部，避免阈值抖动
  active-days: 7                  # 最近 N 天访问 /notes 或关注流视为活跃粉丝

# JWT 配置
jwt:
  secret: SchoolTicket2026SecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong
  expiration: 86400000  # 24小时

# Cookie 配置
cookie:
  name: token
  domain: localhost
  path: /
  max-age: 86400
  http-only: true
